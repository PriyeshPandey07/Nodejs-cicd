name: CI Workflows

on: 
   push:

jobs:
  build-and-test:  #Name of the job
    runs-on: ubuntu-latest #Github runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 #to clone the code into ubuntu runner

      - name: Set up Docker 
        uses: docker/setup-buildx-action@v4

      - name: Docker login  #to authenticate to Docker Hub using secrets stored in GitHub 
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push
        uses: actions/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/nodejs-cicd:latest

